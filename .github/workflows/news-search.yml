name: News Search

on:
  schedule:
    # 8:00 JST
    - cron: '00 23 * * *'
    # 12:00 JST
    - cron: '0 3 * * *'
    # 17:00 JST
    - cron: '0 8 * * *'
    # 20:00 JST
    - cron: '0 11 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  search-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Search and post news
        env:
          BUFFER_API_KEY: ${{ secrets.BUFFER_API_KEY }}
          BUFFER_ORG_ID: ${{ secrets.BUFFER_ORG_ID }}
        run: python news_search.py

      - name: Commit posted_news.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posted_news.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "Update posted_news $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
